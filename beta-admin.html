<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beta Admin — Jeremiah Gutierrez</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/images/favicon-180.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/beta-admin.css">
</head>
<body class="admin-body">

  <nav class="admin-nav">
    <a href="index.html" class="logo admin-logo">JG</a>
    <span class="admin-badge">Beta Admin</span>
    <button class="logout-btn" id="logoutBtn" style="display: none;">Sign out</button>
  </nav>

  <!-- Login Gate -->
  <section class="login-gate" id="loginGate">
    <div class="login-card">
      <h2 class="login-title">Beta Admin</h2>
      <p class="login-hint">Sign in to manage beta signups and feedback.</p>
      <button class="google-signin-btn" id="googleSignInBtn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>
      <div class="login-error" id="loginError" style="display: none;"></div>
    </div>
  </section>

  <!-- Admin Panel -->
  <section class="admin-panel" id="adminPanel" style="display: none;">

    <!-- Stats Bar -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-card">
        <span class="stat-card-num" id="totalSignups">-</span>
        <span class="stat-card-label">Signups</span>
      </div>
      <div class="stat-card">
        <span class="stat-card-num" id="totalFeedback">-</span>
        <span class="stat-card-label">Feedback</span>
      </div>
      <div class="stat-card">
        <span class="stat-card-num" id="totalApps">-</span>
        <span class="stat-card-label">App Picks</span>
      </div>
    </div>

    <!-- Tabs -->
    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="signups">Signups</button>
      <button class="admin-tab" data-tab="feedback">Feedback</button>
    </div>

    <!-- Signups Tab -->
    <div class="tab-content" id="signupsTab">
      <div class="admin-toolbar">
        <select class="admin-filter" id="signupStatusFilter">
          <option value="all">All statuses</option>
          <option value="signed_up">Signed Up</option>
          <option value="invited">Invited</option>
          <option value="active">Active</option>
          <option value="ghosted">Ghosted</option>
        </select>
        <select class="admin-filter" id="signupAppFilter">
          <option value="all">All apps</option>
          <option value="exercise-roulette">Exercise Roulette</option>
          <option value="morrowmark">MorrowMark</option>
          <option value="singles-advocate">Singles Advocate</option>
          <option value="ceo-summer-camp">CEO Summer Camp</option>
        </select>
      </div>
      <div class="admin-list" id="signupsList">
        <p class="admin-loading">Loading signups...</p>
      </div>
    </div>

    <!-- Feedback Tab -->
    <div class="tab-content" id="feedbackTab" style="display: none;">
      <div class="admin-toolbar">
        <select class="admin-filter" id="feedbackAppFilter">
          <option value="all">All apps</option>
          <option value="exercise-roulette">Exercise Roulette</option>
          <option value="morrowmark">MorrowMark</option>
          <option value="singles-advocate">Singles Advocate</option>
          <option value="ceo-summer-camp">CEO Summer Camp</option>
        </select>
        <select class="admin-filter" id="feedbackTypeFilter">
          <option value="all">All types</option>
          <option value="bug">Bugs</option>
          <option value="feature">Features</option>
          <option value="impression">Vibes</option>
        </select>
        <select class="admin-filter" id="feedbackStatusFilter">
          <option value="all">All statuses</option>
          <option value="new">New</option>
          <option value="reviewed">Reviewed</option>
          <option value="fixed">Fixed</option>
          <option value="wontfix">Won't Fix</option>
        </select>
      </div>
      <div class="admin-list" id="feedbackList">
        <p class="admin-loading">Loading feedback...</p>
      </div>
    </div>

  </section>

  <script type="module" src="js/beta-admin.js"></script>
</body>
</html>
