<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Jeremiah Gutierrez</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/images/favicon-180.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/family.css">
</head>
<body class="admin-body">

  <nav class="admin-nav">
    <a href="index.html" class="logo admin-logo">JG</a>
    <span class="admin-badge">Admin</span>
    <button class="logout-btn" id="logoutBtn" style="display: none;">Sign out</button>
  </nav>

  <!-- Login Gate — Google Sign-In -->
  <section class="login-gate" id="loginGate">
    <div class="login-card">
      <h2 class="login-title">Admin Access</h2>
      <p class="login-hint">Sign in with your Google account to manage the gallery.</p>
      <button class="google-signin-btn" id="googleSignInBtn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>
      <div class="login-error" id="loginError" style="display: none;"></div>
    </div>
  </section>

  <!-- Admin Panel (hidden until authenticated) -->
  <section class="admin-panel" id="adminPanel" style="display: none;">

    <!-- Publish from Drive -->
    <div class="admin-section">
      <h2 class="admin-heading">Publish from Google Drive</h2>
      <button class="drive-picker-btn" id="drivePickerBtn">Browse Google Drive</button>

      <!-- Publish Queue -->
      <div class="publish-queue" id="publishQueue" style="display: none;">
        <h3 class="queue-title">Ready to publish</h3>
        <div class="queue-items" id="queueItems"></div>
        <div class="queue-actions">
          <button class="submit-btn" id="publishAllBtn">Publish all</button>
          <button class="clear-queue-btn" id="clearQueueBtn">Clear</button>
        </div>
      </div>
    </div>

    <!-- Published Photos -->
    <div class="admin-section">
      <h2 class="admin-heading">Published Photos</h2>
      <div class="admin-filters">
        <input type="text" class="admin-search" id="adminSearch" placeholder="Search photos...">
        <select class="admin-category-filter" id="adminCategoryFilter">
          <option value="">All categories</option>
        </select>
      </div>
      <div class="admin-posts" id="adminPhotos">
        <!-- Rendered by JS -->
      </div>
      <div class="admin-empty" id="adminEmpty" style="display: none;">
        <p>No published photos yet. Browse Google Drive to add some.</p>
      </div>
    </div>
  </section>

  <!-- Edit Modal -->
  <div class="edit-modal-overlay" id="editModalOverlay" style="display: none;">
    <div class="edit-modal">
      <h3 class="edit-modal-title">Edit Photo</h3>
      <form id="editForm">
        <input type="hidden" id="editPhotoId">
        <div class="field">
          <label for="editCaption">Caption</label>
          <textarea id="editCaption" rows="2" placeholder="Add a caption..."></textarea>
        </div>
        <div class="field">
          <label for="editLocation">Location</label>
          <input type="text" id="editLocation" placeholder="Fort Lauderdale, FL">
        </div>
        <div class="field">
          <label for="editCategory">Category</label>
          <select id="editCategory">
            <option value="">None</option>
            <option value="family">Family</option>
            <option value="events">Events</option>
            <option value="forum">Forum</option>
            <option value="coaching">Coaching</option>
            <option value="speaking">Speaking</option>
            <option value="travel">Travel</option>
          </select>
        </div>
        <div class="field">
          <label for="editTags">Tags <span class="optional">(comma-separated)</span></label>
          <input type="text" id="editTags" placeholder="ypo, retreat, 2026">
        </div>
        <div class="field">
          <label for="editPeople">People <span class="optional">(comma-separated)</span></label>
          <input type="text" id="editPeople" placeholder="Jeremiah, Sarah">
        </div>
        <div class="edit-modal-actions">
          <button type="submit" class="submit-btn">Save</button>
          <button type="button" class="cancel-btn" id="editCancelBtn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
